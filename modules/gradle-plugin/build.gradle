plugins {
    id 'java-gradle-plugin'
    id 'groovy'
}

group = 'kasuga.build'
version = '1.0.0'

repositories {
    mavenCentral()
    gradlePluginPortal()
}

dependencies {
    implementation localGroovy()
    implementation gradleApi()
    implementation("com.gradleup.shadow:com.gradleup.shadow.gradle.plugin:9.0.2")
}

gradlePlugin {
    plugins {
        kasugaBuilder {
            id = 'builder.kasuga.generator'
            implementationClass = 'builder.kasuga.KasugaGeneratorPlugin'
        }
    }
}